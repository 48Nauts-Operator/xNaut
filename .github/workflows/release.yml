name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          # Keep the Intel build on an Intel host so Homebrew OpenSSL matches
          # the x86_64 target architecture.
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install OpenSSL (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      # Import the Developer ID Application cert into a throwaway keychain so
      # `cargo tauri build` can codesign. Skipped automatically if the secret is
      # absent (build stays un-notarized rather than failing).
      - name: Import Apple Developer ID certificate (macOS)
        if: contains(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret set — building un-notarized (Gatekeeper will flag downloads)."
            exit 0
          fi
          KEYCHAIN=build.keychain
          KPW="ci-temp-$(uuidgen)"
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f cert.p12

      - name: Build signed release
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Apple Developer ID codesign + notarize (macOS). Tauri notarizes and
          # staples automatically when these are set; harmless/ignored on Windows.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build --target ${{ matrix.target }}

      # Tauri notarizes the .app but NOT the .dmg wrapper, so a downloaded DMG
      # still trips Gatekeeper ("cannot check for malicious software"). Notarize
      # + staple the DMG itself. Uses the same Apple secrets; no-op if unset.
      - name: Notarize + staple the DMG (macOS)
        if: contains(matrix.platform, 'macos')
        working-directory: src-tauri
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          if [ -z "$APPLE_PASSWORD" ]; then
            echo "No APPLE_PASSWORD — skipping DMG notarization."
            exit 0
          fi
          DMG=$(ls target/${{ matrix.target }}/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then echo "No DMG found — skipping."; exit 0; fi
          echo "Notarizing $DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          spctl -a -vvv -t open --context context:primary-signature "$DMG" || true

      - name: Generate latest.json for updater (macOS aarch64 only)
        if: matrix.target == 'aarch64-apple-darwin'
        working-directory: src-tauri
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SIG=$(cat target/aarch64-apple-darwin/release/bundle/macos/xNAUT.app.tar.gz.sig 2>/dev/null || echo "")
          cat > target/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "xNAUT ${VERSION} — see release notes for details",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/48Nauts-Operator/xNaut/releases/download/v${VERSION}/xNAUT-macos-aarch64.app.tar.gz"
              }
            }
          }
          MANIFEST

      - name: Rename artifacts for clarity
        shell: bash
        working-directory: src-tauri
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            cp target/aarch64-apple-darwin/release/bundle/dmg/*.dmg target/xNAUT-${VERSION}-macos-aarch64.dmg 2>/dev/null || true
            cp target/aarch64-apple-darwin/release/bundle/macos/xNAUT.app.tar.gz target/xNAUT-macos-aarch64.app.tar.gz 2>/dev/null || true
          elif [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            cp target/x86_64-apple-darwin/release/bundle/dmg/*.dmg target/xNAUT-${VERSION}-macos-x64.dmg 2>/dev/null || true
          elif [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi target/xNAUT-${VERSION}-windows-x64.msi 2>/dev/null || true
            cp target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe target/xNAUT-${VERSION}-windows-x64-setup.exe 2>/dev/null || true
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/xNAUT-*.dmg
            src-tauri/target/xNAUT-*.msi
            src-tauri/target/xNAUT-*-setup.exe
            src-tauri/target/xNAUT-*.app.tar.gz
            src-tauri/target/latest.json
          generate_release_notes: true

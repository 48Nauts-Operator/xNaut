name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build signed release
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Generate latest.json for updater (macOS aarch64 only)
        if: matrix.target == 'aarch64-apple-darwin'
        working-directory: src-tauri
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SIG=$(cat target/aarch64-apple-darwin/release/bundle/macos/xNAUT.app.tar.gz.sig 2>/dev/null || echo "")
          cat > target/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "xNAUT ${VERSION} — see release notes for details",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/48Nauts-Operator/xNaut/releases/download/v${VERSION}/xNAUT-macos-aarch64.app.tar.gz"
              }
            }
          }
          MANIFEST

      - name: Rename artifacts for clarity
        shell: bash
        working-directory: src-tauri
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            cp target/aarch64-apple-darwin/release/bundle/dmg/*.dmg target/xNAUT-${VERSION}-macos-aarch64.dmg 2>/dev/null || true
            cp target/aarch64-apple-darwin/release/bundle/macos/xNAUT.app.tar.gz target/xNAUT-macos-aarch64.app.tar.gz 2>/dev/null || true
          elif [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            cp target/x86_64-apple-darwin/release/bundle/dmg/*.dmg target/xNAUT-${VERSION}-macos-x64.dmg 2>/dev/null || true
          elif [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi target/xNAUT-${VERSION}-windows-x64.msi 2>/dev/null || true
            cp target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe target/xNAUT-${VERSION}-windows-x64-setup.exe 2>/dev/null || true
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/xNAUT-*.dmg
            src-tauri/target/xNAUT-*.msi
            src-tauri/target/xNAUT-*-setup.exe
            src-tauri/target/xNAUT-*.app.tar.gz
            src-tauri/target/latest.json
          generate_release_notes: true

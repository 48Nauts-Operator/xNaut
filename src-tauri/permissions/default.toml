  "allow-create-ssh-session",
  "allow-list-ssh-sessions",
  "allow-get-ssh-config-hosts",
  "allow-list-directory",
  "allow-get-home-directory",
  "allow-get-current-directory",
  "allow-get-git-info",
  "allow-write-to-ssh",
  "allow-create-command-session",
  "allow-ralph-read-prd",
  "allow-ralph-write-prd",
  "allow-ralph-backup-prd",
  "allow-ralph-list-backups",
  "allow-ralph-restore-backup",
  "allow-ralph-detect-clis",
  "allow-ralph-check-cli-health",
  "allow-ralph-run-ac-test",
  "allow-ralph-read-config",
  "allow-ralph-write-config",
  "allow-ralph-write-temp-file",
  "allow-ralph-cleanup-temp-file"
